<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: public-head(${creator.displayName + ' — ' + siteSettings.siteName})}"></head>
<body class="public-body">
<header th:replace="~{fragments/layout :: public-header}"></header>
<main class="public-main creator-page">
	<section class="creator-header">
		<img th:replace="~{fragments/layout :: avatar-img(${creator.avatarUrl}, 'creator-avatar')}">
		<h1 th:text="${creator.displayName}">Creator</h1>
		<p th:text="'@' + ${creator.username}">@username</p>
		<p th:if="${creator.bio}" th:text="${creator.bio}">Bio</p>
		<form sec:authorize="isAuthenticated()" th:action="@{/engagement/creators/{username}/subscribe(username=${creator.username})}" method="post" class="inline-form">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit" th:text="${subscribed} ? 'Unfollow' : 'Follow'">Follow</button>
		</form>
		<p sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Sign in</a> to follow this creator.</p>
	</section>
	<section class="feed-section">
		<h2>Stories</h2>
		<div class="catalog-grid">
			<th:block th:each="post : ${posts}">
				<article th:replace="~{fragments/layout :: catalog-card(${post}, false, false)}"></article>
			</th:block>
		</div>
		<p class="empty-state" th:if="${posts.isEmpty()}">No published stories yet.</p>
	</section>
</main>
<footer th:replace="~{fragments/layout :: public-footer}"></footer>
</body>
</html>
