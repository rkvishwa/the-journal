<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: public-head('Following — ' + ${siteSettings.siteName})}"></head>
<body class="public-body">
<header th:replace="~{fragments/layout :: public-header}"></header>
<main class="public-main">
	<h1>Following</h1>
	<div class="catalog-grid">
		<th:block th:each="post : ${posts}">
			<article th:replace="~{fragments/layout :: catalog-card(${post}, true, false)}"></article>
		</th:block>
	</div>
	<p class="empty-state" th:if="${posts.isEmpty()}">Follow creators to see their latest stories here.</p>
</main>
<footer th:replace="~{fragments/layout :: public-footer}"></footer>
</body>
</html>
