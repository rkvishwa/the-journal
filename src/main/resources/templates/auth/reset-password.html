<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: public-head('Reset password')}"></head>
<body class="public-body">
<th:block th:replace="~{fragments/layout :: theme-toggle-standalone}"></th:block>
<main class="auth-page">
	<div class="auth-card">
		<h1>Reset password</h1>
		<p class="notice" th:if="${message}" th:text="${message}"></p>
		<form th:action="@{/reset-password}" th:object="${resetForm}" method="post">
			<label>
				<span>Email</span>
				<input type="email" th:field="*{email}" required>
			</label>
			<label>
				<span>Reset code</span>
				<input type="text" th:field="*{code}" maxlength="6" required>
				<small class="error" th:errors="*{code}"></small>
			</label>
			<label>
				<span>New password</span>
				<input type="password" th:field="*{password}" required>
			</label>
			<label>
				<span>Confirm password</span>
				<input type="password" th:field="*{confirmPassword}" required>
				<small class="error" th:errors="*{confirmPassword}"></small>
			</label>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Update password</button>
		</form>
	</div>
</main>
<th:block th:replace="~{fragments/layout :: back-to-top}"></th:block>
<script th:src="@{/js/theme.js}" defer></script>
</body>
</html>
