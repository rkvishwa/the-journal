<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: public-head('Register — ' + ${siteSettings.siteName})}"></head>
<body class="public-body">
<header th:replace="~{fragments/layout :: public-header}"></header>
<main class="auth-page">
	<div class="auth-card">
		<h1>Create account</h1>
		<p class="auth-subtitle">Join to write, save posts, and follow creators.</p>
		<form th:action="@{/register}" th:object="${registerForm}" method="post">
			<p class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
			<label>
				<span>Email</span>
				<input type="email" th:field="*{email}" required>
				<small class="error" th:errors="*{email}"></small>
			</label>
			<label>
				<span>Username</span>
				<input type="text" th:field="*{username}" required>
				<small class="error" th:errors="*{username}"></small>
			</label>
			<label>
				<span>Password</span>
				<span class="password-field">
					<input type="password" th:field="*{password}" required>
					<button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
						<svg class="password-toggle-icon password-toggle-icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
							<circle cx="12" cy="12" r="3"></circle>
						</svg>
						<svg class="password-toggle-icon password-toggle-icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"></path>
							<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"></path>
							<line x1="1" y1="1" x2="23" y2="23"></line>
							<path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
						</svg>
					</button>
				</span>
				<small class="error" th:errors="*{password}"></small>
			</label>
			<label>
				<span>Confirm password</span>
				<span class="password-field">
					<input type="password" th:field="*{confirmPassword}" required>
					<button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
						<svg class="password-toggle-icon password-toggle-icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
							<circle cx="12" cy="12" r="3"></circle>
						</svg>
						<svg class="password-toggle-icon password-toggle-icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94"></path>
							<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"></path>
							<line x1="1" y1="1" x2="23" y2="23"></line>
							<path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
						</svg>
					</button>
				</span>
				<small class="error" th:errors="*{confirmPassword}"></small>
			</label>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit" class="auth-submit">Create account</button>
		</form>
		<div class="auth-divider" aria-hidden="true"><span>or</span></div>
		<a class="auth-google-btn" th:href="@{/oauth2/authorization/google}">
			<img class="auth-google-icon" th:src="@{/images/google.svg}" alt="">
			<span>Continue with Google</span>
		</a>
		<p class="auth-signup-prompt">
			Already have an account?
			<a th:href="@{/login}">Sign in</a>
		</p>
	</div>
</main>
<footer th:replace="~{fragments/layout :: public-footer}"></footer>
</body>
</html>
