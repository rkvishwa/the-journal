<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: public-head('Forgot password')}"></head>
<body>
<main class="auth-page">
	<div class="auth-card">
		<h1>Forgot password</h1>
		<form th:action="@{/forgot-password}" th:object="${forgotForm}" method="post">
			<label>
				<span>Email</span>
				<input type="email" th:field="*{email}" required>
				<small class="error" th:errors="*{email}"></small>
			</label>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button type="submit">Send reset code</button>
		</form>
		<a class="auth-back" th:href="@{/login}">← Back to sign in</a>
	</div>
</main>
</body>
</html>
