<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/studio-layout :: studio-panel-head('Comments — Studio')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell studio-shell">
	<aside th:replace="~{fragments/studio-layout :: sidebar(activePage='comments')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/studio-layout :: topbar(pageTitle='Pending comments')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<div class="comment-moderation-list" th:if="${!comments.isEmpty()}">
				<article class="comment-mod-item panel" th:each="comment : ${comments}">
					<p class="comment-mod-meta">
						<strong th:text="${comment.author.username}">user</strong> on
						<span th:text="${comment.post.title}">Post</span>
					</p>
					<p th:text="${comment.body}">Comment</p>
					<div class="comment-mod-actions">
						<form th:action="@{/studio/comments/{id}/approve(id=${comment.id})}" method="post" class="inline-form">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<button type="submit">Approve</button>
						</form>
						<form th:action="@{/studio/comments/{id}/reject(id=${comment.id})}" method="post" class="inline-form">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<button type="submit" class="button secondary">Reject</button>
						</form>
					</div>
				</article>
			</div>
			<p class="empty-state" th:if="${comments.isEmpty()}">No pending comments.</p>
		</main>
	</div>
</div>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
