<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: public-head(${siteSettings.siteName})}"></head>
<body class="public-body">
<header th:replace="~{fragments/layout :: public-header}"></header>
<main class="public-main catalog-main">
	<section class="catalog-hero">
		<div class="catalog-hero-copy">
			<h1 th:text="${siteSettings.siteName}">The Journal</h1>
			<p th:text="${siteSettings.tagline}">Ideas worth keeping.</p>
		</div>

		<form class="catalog-search-form" method="get" th:action="@{/}">
			<label class="catalog-search-field">
				<input type="search" name="q" placeholder="Search by title or author…" th:value="${searchQuery}"
						autocomplete="off" aria-label="Search by title or author">
			</label>
			<button type="submit" class="catalog-icon-button catalog-search-submit" aria-label="Search">
				<svg class="catalog-icon-button-graphic" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
					<circle cx="11" cy="11" r="8"></circle>
					<path d="m21 21-4.3-4.3"></path>
				</svg>
			</button>
			<details class="catalog-filters" th:open="${searching}">
				<summary class="catalog-icon-button catalog-filters-summary" aria-label="Filters">
					<svg class="catalog-icon-button-graphic catalog-filters-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path>
					</svg>
					<span class="catalog-filters-badge" th:if="${searching}" aria-hidden="true"></span>
				</summary>
				<div class="catalog-filters-panel">
					<label class="catalog-filter-field">
						<span class="catalog-field-label">From</span>
						<input type="date" name="from"
								th:value="${searchFrom != null ? #temporals.format(searchFrom, 'yyyy-MM-dd') : ''}">
					</label>
					<label class="catalog-filter-field">
						<span class="catalog-field-label">To</span>
						<input type="date" name="to"
								th:value="${searchTo != null ? #temporals.format(searchTo, 'yyyy-MM-dd') : ''}">
					</label>
					<label class="catalog-filter-field">
						<span class="catalog-field-label">Sort</span>
						<select name="sort">
							<option value="latest" th:selected="${searchSort == 'latest'}">Latest first</option>
							<option value="oldest" th:selected="${searchSort == 'oldest'}">Oldest first</option>
						</select>
					</label>
					<div class="catalog-filters-actions">
						<button type="submit" class="button">Apply</button>
						<a class="button secondary" th:if="${searching}" th:href="@{/}">Clear</a>
					</div>
				</div>
			</details>
		</form>
	</section>

	<section class="feed-section" th:if="${searching}">
		<h2>Results</h2>
		<div class="catalog-grid" th:if="${!searchResults.isEmpty()}">
			<th:block th:each="post : ${searchResults}">
				<article th:replace="~{fragments/layout :: catalog-card(${post}, true, true)}"></article>
			</th:block>
		</div>
		<p class="empty-state" th:if="${searchResults.isEmpty()}">No posts match your search.</p>
	</section>

	<section class="feed-section" th:unless="${searching}">
		<h2>Latest</h2>
		<div class="catalog-grid" th:if="${!latestPosts.isEmpty()}">
			<th:block th:each="post : ${latestPosts}">
				<article th:replace="~{fragments/layout :: catalog-card(${post}, true, true)}"></article>
			</th:block>
		</div>
		<p class="empty-state" th:if="${latestPosts.isEmpty()}">No published stories yet. Be the first to write.</p>
	</section>

	<section class="feed-section" th:unless="${searching}">
		<h2>Discover</h2>
		<div class="catalog-grid" th:if="${!discoverPosts.isEmpty()}">
			<th:block th:each="post : ${discoverPosts}">
				<article th:replace="~{fragments/layout :: catalog-card(${post}, true, false)}"></article>
			</th:block>
		</div>
	</section>
</main>
<footer th:replace="~{fragments/layout :: public-footer}"></footer>
</body>
</html>
