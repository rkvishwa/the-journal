<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: public-head('Error')}"></head>
<body>
<header th:replace="~{fragments/layout :: public-header}"></header>
<main class="error-page">
	<section class="error-panel">
		<p class="error-code" th:text="${status ?: 'Error'}">Error</p>
		<h1>Something needs attention.</h1>
		<p th:text="${message ?: 'The page could not be shown right now.'}">The page could not be shown right now.</p>
		<div class="button-row">
			<a class="button" th:href="@{/}">Back to writing</a>
			<a class="button secondary" th:href="@{/admin}">Dashboard</a>
		</div>
	</section>
</main>
<footer th:replace="~{fragments/layout :: public-footer}"></footer>
</body>
</html>
