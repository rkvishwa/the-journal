<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: admin-panel-head('Comments — Admin')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell">
	<aside th:replace="~{fragments/admin-layout :: sidebar(activePage='comments')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/admin-layout :: topbar(pageTitle='Comments')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<div class="admin-table-wrap" th:if="${!comments.isEmpty()}">
				<table class="admin-data-table">
					<thead>
					<tr>
						<th>Comment</th>
						<th>Author</th>
						<th>Post</th>
						<th>Submitted</th>
						<th>Actions</th>
					</tr>
					</thead>
					<tbody>
					<tr th:each="comment : ${comments}">
						<td class="comment-body-cell" data-label="Comment" th:text="${comment.body}">Comment body</td>
						<td data-label="Author" th:text="${comment.author.username}">author</td>
						<td data-label="Post" th:text="${comment.post.title}">Post title</td>
						<td data-label="Submitted" th:text="${#temporals.format(comment.createdAt, 'MMM d, yyyy')}">Jan 1, 2026</td>
						<td class="actions" data-label="Actions">
							<div class="admin-row-actions">
								<form th:action="@{/admin/comments/{id}/approve(id=${comment.id})}" method="post" class="inline-form">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button type="submit" class="button">Approve</button>
								</form>
								<form th:action="@{/admin/comments/{id}/reject(id=${comment.id})}" method="post" class="inline-form">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
									<button type="submit" class="button secondary">Reject</button>
								</form>
							</div>
						</td>
					</tr>
					</tbody>
				</table>
			</div>
			<p class="empty-state" th:if="${comments.isEmpty()}">No pending comments.</p>
		</main>
	</div>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
