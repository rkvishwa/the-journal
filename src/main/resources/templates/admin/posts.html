<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: admin-panel-head('Posts — Admin')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell">
	<aside th:replace="~{fragments/admin-layout :: sidebar(activePage='posts')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/admin-layout :: topbar(pageTitle='Posts')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<div class="admin-toolbar">
				<label class="admin-search">
					<span>Search</span>
					<input type="search" id="post-search" placeholder="Filter by title or author…">
				</label>
			</div>
			<div class="admin-table-wrap">
				<table class="admin-data-table" id="posts-table">
					<thead>
					<tr>
						<th>Title</th>
						<th>Author</th>
						<th>Status</th>
						<th>Updated</th>
						<th>Actions</th>
					</tr>
					</thead>
					<tbody>
					<tr th:each="post : ${posts}"
							th:attr="data-search=${post.title + ' ' + post.author.username}">
						<td class="post-title-cell" data-label="Title" th:text="${post.title}">Title</td>
						<td data-label="Author" th:text="${post.author.username}">author</td>
						<td class="status-cell" data-label="Status">
							<span class="status-badge"
									th:classappend="${post.status.name() == 'PUBLISHED'} ? 'is-published' : (${post.status.name() == 'SCHEDULED'} ? 'is-scheduled' : 'is-draft')"
									th:text="${post.status}">DRAFT</span>
						</td>
						<td data-label="Updated" th:text="${#temporals.format(post.updatedAt, 'MMM d, yyyy')}">Jan 1, 2026</td>
						<td class="actions" data-label="Actions">
							<form th:if="${post.status.name() == 'PUBLISHED'}"
									th:action="@{/admin/posts/{id}/unpublish(id=${post.id})}" method="post">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								<button type="submit" class="button secondary">Unpublish</button>
							</form>
						</td>
					</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
