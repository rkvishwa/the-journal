<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: admin-panel-head('Users — Admin')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell">
	<aside th:replace="~{fragments/admin-layout :: sidebar(activePage='users')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/admin-layout :: topbar(pageTitle='Users')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<div class="admin-toolbar">
				<label class="admin-search">
					<span>Search</span>
					<input type="search" id="user-search" placeholder="Filter by username or email…">
				</label>
			</div>
			<div class="admin-table-wrap">
				<table class="admin-data-table" id="users-table">
					<thead>
					<tr>
						<th>Username</th>
						<th>Email</th>
						<th>Roles</th>
						<th>Status</th>
						<th>Joined</th>
						<th>Actions</th>
					</tr>
					</thead>
					<tbody>
					<tr th:each="user : ${users}" th:attr="data-search=${user.username + ' ' + user.email}">
						<td data-label="Username" th:text="${user.username}">user</td>
						<td data-label="Email" th:text="${user.email}">email</td>
						<td data-label="Roles">
							<span class="badge" th:each="role : ${user.roles}" th:text="${role}">MEMBER</span>
						</td>
						<td class="status-cell" data-label="Status">
							<span class="status-badge" th:classappend="${user.enabled} ? 'is-active' : 'is-disabled'"
									th:text="${user.enabled} ? 'Active' : 'Disabled'">Active</span>
						</td>
						<td data-label="Joined" th:text="${#temporals.format(user.createdAt, 'MMM d, yyyy')}">Jan 1, 2026</td>
						<td class="actions" data-label="Actions">
							<form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								<button type="submit" class="button secondary"
										th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</button>
							</form>
						</td>
					</tr>
					</tbody>
				</table>
			</div>
		</main>
	</div>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
