<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: admin-panel-head('Site settings — Admin')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell">
	<aside th:replace="~{fragments/admin-layout :: sidebar(activePage='site-settings')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/admin-layout :: topbar(pageTitle='Site settings')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<section class="panel">
				<h2>Public site branding</h2>
				<form th:action="@{/admin/settings}" method="post">
					<label>
						<span>Site name</span>
						<input name="siteName" th:value="${siteName}" required>
					</label>
					<label>
						<span>Tagline</span>
						<input name="tagline" th:value="${tagline}" required>
					</label>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Save settings</button>
				</form>
			</section>
		</main>
	</div>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
