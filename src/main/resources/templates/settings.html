<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/studio-layout :: studio-panel-head('Settings — Studio')}"></head>
<body class="admin-body admin-panel-body">
<div class="admin-shell studio-shell">
	<aside th:replace="~{fragments/studio-layout :: sidebar(activePage='settings')}"></aside>
	<div class="admin-main">
		<header th:replace="~{fragments/studio-layout :: topbar(pageTitle='Settings')}"></header>
		<main class="admin-content">
			<p class="notice" th:if="${message}" th:text="${message}"></p>
			<p class="notice error" th:if="${error}" th:text="${error}"></p>
			<p class="notice" th:if="${param.linked}">Google account connected.</p>

			<section class="panel">
				<h2>Profile picture</h2>
				<form th:action="@{/settings/profile/avatar}" method="post" enctype="multipart/form-data">
					<div class="avatar-field">
						<div class="avatar-upload">
							<img th:replace="~{fragments/layout :: avatar-img(${studioUser.avatarUrl}, 'avatar-preview')}">
							<div class="avatar-upload-controls">
								<label>
									<span>Choose image</span>
									<input type="file" name="avatar" accept="image/jpeg,image/png,image/gif,image/webp" required>
								</label>
								<p class="field-hint">JPEG, PNG, GIF, or WebP. Max 5 MB.</p>
							</div>
						</div>
					</div>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Update profile picture</button>
				</form>
			</section>

			<section class="panel">
				<h2>Profile</h2>
				<form th:action="@{/settings/profile}" th:object="${profileForm}" method="post">
					<label><span>Display name</span><input th:field="*{displayName}" required></label>
					<label><span>Username</span><input th:field="*{username}" required></label>
					<label><span>Bio</span><textarea th:field="*{bio}" rows="3"></textarea></label>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Save profile</button>
				</form>
			</section>

			<section class="panel" th:if="${hasPassword}">
				<h2>Change password</h2>
				<form th:action="@{/settings/password}" th:object="${changePasswordForm}" method="post">
					<label><span>Current password</span><input type="password" th:field="*{currentPassword}"></label>
					<label><span>New password</span><input type="password" th:field="*{password}"></label>
					<label><span>Confirm password</span><input type="password" th:field="*{confirmPassword}"></label>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Update password</button>
				</form>
			</section>

			<section class="panel" th:unless="${hasPassword}">
				<h2>Set a password</h2>
				<p>You signed in with Google. Use <a th:href="@{/forgot-password}">forgot password</a> with your email to set a local password.</p>
			</section>

			<section class="panel">
				<h2>Connected accounts</h2>
				<p th:if="${googleLinked}">Google is connected.</p>
				<p th:unless="${googleLinked}">Google is not connected.</p>
				<a th:unless="${googleLinked}" class="button" th:href="@{/settings/connect/google}">Connect Google</a>
				<form th:if="${googleLinked}" th:action="@{/settings/disconnect/google}" method="post">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
					<button type="submit">Disconnect Google</button>
				</form>
			</section>
		</main>
	</div>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/app.js}" defer></script>
</body>
</html>
