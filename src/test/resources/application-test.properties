spring.datasource.url=jdbc:h2:mem:blog-engine-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
blog.admin-email=admin@test.local
blog.admin-username=admin
blog.admin-password=change-me-admin
blog.upload-dir=${java.io.tmpdir}/blog-engine-test-uploads
blog.site-name=The Journal Test
blog.base-url=http://localhost:8080
blog.mail-from=

spring.security.oauth2.client.registration.google.client-id=test-client
spring.security.oauth2.client.registration.google.client-secret=test-secret
