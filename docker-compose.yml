services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-blog_engine}
      MYSQL_USER: ${DB_USERNAME:-blog_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build:
      context: .
    image: blog-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      BLOG_UPLOAD_DIR: /app/data/uploads
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
      SPRING_THYMELEAF_CACHE: "true"
    volumes:
      - app-uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  phpmyadmin:
    image: phpmyadmin:5-apache
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PHPMYADMIN_ABSOLUTE_URI:-https://seinnlae.me/phpmyadmin/}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
      - phpmyadmin

volumes:
  mariadb-data:
  app-uploads:
  caddy-data:
  caddy-config:
